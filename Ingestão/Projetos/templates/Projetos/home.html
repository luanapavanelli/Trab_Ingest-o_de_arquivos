<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"><title>Meus Projetos - Ingestão</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#131314] text-[#e3e3e3] p-10 antialiased">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-medium mb-10">Meus Projetos</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            {% for projeto in projetos %}
            <div class="relative bg-[#1e1f20] border border-[#444746] rounded-2xl hover:border-[#a8c7fa] transition group">
                
                <form method="POST" action="{% url 'deletar_projeto' projeto.id %}" class="absolute top-4 right-4 z-10" onsubmit="return confirm('Tem certeza que deseja apagar este projeto e TODOS os seus arquivos?');">
                    {% csrf_token %}
                    <button type="submit" class="text-[#c4c7c5] hover:text-red-500 transition p-2 bg-[#131314] rounded-md border border-[#444746] hover:border-red-500" title="Excluir Projeto">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                </form>

                <a href="{% url 'dashboard' projeto.id %}" class="block p-6">
                    <div class="w-12 h-12 bg-blue-500/20 rounded-lg mb-4 flex items-center justify-center text-[#a8c7fa]">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>
                    </div>
                    <h2 class="text-xl font-medium group-hover:text-[#a8c7fa] pr-10">{{ projeto.nome }}</h2>
                    <p class="text-sm text-[#c4c7c5] mt-2">{{ projeto.descricao|truncatewords:15 }}</p>
                    <div class="mt-6 text-xs text-[#c4c7c5]">Criado em: {{ projeto.data_criacao|date:"d M Y" }}</div>
                </a>
            </div>
            {% endfor %}

            <form method="POST" action="{% url 'home' %}" class="block p-6 bg-[#1e1f20] border-2 border-dashed border-[#444746] rounded-2xl hover:border-[#a8c7fa] transition flex flex-col justify-center">
                {% csrf_token %}
                <div class="flex items-center gap-2 mb-4 text-[#a8c7fa]">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                    <h2 class="text-xl font-medium">Novo Projeto</h2>
                </div>
                
                <input type="text" name="nome" placeholder="Nome do Projeto (Ex: Redes)" required class="w-full bg-[#131314] border border-[#444746] rounded-md px-3 py-2 mb-3 text-sm text-[#e3e3e3] outline-none focus:border-[#a8c7fa] transition">
                
                <input type="text" name="descricao" placeholder="Breve descrição" class="w-full bg-[#131314] border border-[#444746] rounded-md px-3 py-2 mb-4 text-sm text-[#e3e3e3] outline-none focus:border-[#a8c7fa] transition">
                
                <button type="submit" class="w-full bg-[#a8c7fa] hover:bg-[#d3e3fd] text-[#131314] font-semibold py-2 rounded-md transition text-sm">
                    Criar e Entrar
                </button>
            </form>
            
        </div>
    </div>
</body>
</html>
